name: Pipeline

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:
    inputs:
      release-type:
        description: "Type of release (major, minor, patch, alpha)"
        required: true
        default: alpha
        type: choice
        options:
          - major
          - minor
          - patch
          - alpha

permissions:
  contents: write
  id-token: write # Needed for npm trusted publishing
  pull-requests: write

jobs:
  continuous-integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Style
        run: pnpm style:check

      - name: Build
        run: pnpm --filter "expo-mdoc-data-transfer" build

      - name: Check types
        run: pnpm --filter "expo-mdoc-data-transfer" types:check

  continuous-deployment:
    if: github.event_name == 'workflow_dispatch'

    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: continuous-integration

    steps:
      - uses: actions/checkout@v6
        with: 
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update npm
        run: npm install -g npm@^11

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm --filter "expo-mdoc-data-transfer" build

      - name: Set git configuration 
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ${{ inputs.release-type }} == 'alpha' ]; then
            pnpm --filter "expo-mdoc-data-transfer" release --preRelease=alpha
          else
            pnpm --filter "expo-mdoc-data-transfer" release -i=${{ inputs.release-type }}
          fi
